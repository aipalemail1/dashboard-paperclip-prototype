name: Daily Dashboard Publish

on:
  schedule:
    # Daily at 11:05 UTC
    - cron: "5 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dashboard
        run: |
          python generate_dashboard.py

      - name: Commit updated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js *.json || true
          git diff --cached --quiet || git commit -m "chore: daily dashboard refresh"
          git push
